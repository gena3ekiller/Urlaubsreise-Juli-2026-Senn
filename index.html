<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f14" />
    <title>Motorradroute Basel - Caen</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./style.css?v=16" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Tagesliste">
        <header class="brand">
          <div>
            <p class="eyebrow">9 Tage · ohne Autobahn planen</p>
            <h1>Basel → Caen → Basel</h1>
          </div>
          <div class="brand-actions">
            <button class="icon-button" id="printMenuBtn" type="button" title="Drucken" aria-label="Drucken" aria-expanded="false">⎙</button>
            <button class="icon-button" id="showAllMobile" type="button" title="Alles anzeigen" aria-label="Alles anzeigen">↗</button>
          </div>
        </header>

        <label class="search-wrap">
          <span>Suchen</span>
          <input id="searchInput" type="search" placeholder="Tag, Ort, Hotel, Highlight..." autocomplete="off" />
        </label>

        <div class="trip-summary">
          <div><strong>3</strong><span>Länder</span></div>
          <div><strong>9</strong><span>Etappen</span></div>
          <div><strong>~2.970</strong><span>km</span></div>
        </div>

        <section class="print-tools" id="printMenu" aria-label="Druckoptionen" hidden>
          <div class="print-tools-head">
            <div>
              <p class="eyebrow">Druckansicht</p>
              <h2>Route drucken</h2>
            </div>
            <button id="printRouteBtn" type="button">Drucken</button>
          </div>

          <label class="print-field">
            <span>Umfang</span>
            <select id="printScope">
              <option value="active">Aktueller Tag</option>
              <option value="all">Alle Tage</option>
              <option value="custom">Tage auswählen</option>
            </select>
          </label>

          <div class="print-day-picker" id="printDayPicker" aria-label="Tage auswählen"></div>

          <div class="print-options" aria-label="Inhalte auswählen">
            <label><input type="checkbox" data-print-option="meals" checked /> Essen</label>
            <label><input type="checkbox" data-print-option="hotels" checked /> Hotels</label>
            <label><input type="checkbox" data-print-option="stops" checked /> Stopps</label>
            <label><input type="checkbox" data-print-option="notes" checked /> Hinweise</label>
            <label><input type="checkbox" data-print-option="links" checked /> Links</label>
            <label><input type="checkbox" data-print-option="maps" checked /> Bilder/Karten</label>
            <label><input type="checkbox" data-print-option="prices" checked /> Preise</label>
            <label><input type="checkbox" data-print-option="ratings" checked /> Bewertungen</label>
          </div>
        </section>

        <nav class="day-list" id="dayList" aria-label="Reisetage"></nav>
      </aside>

      <main class="main-panel">
        <section class="map-panel" aria-label="Interaktive Karte">
          <div id="map"></div>
          <div class="map-actions" aria-label="Kartenaktionen">
            <button id="showAllBtn" type="button">Alles anzeigen</button>
            <button id="focusDayBtn" type="button">Tag fokussieren</button>
          </div>
        </section>

        <section class="details-panel" id="detailsPanel" aria-live="polite"></section>
      </main>
    </div>

    <div class="place-modal" id="placeModal" aria-hidden="true">
      <div class="place-modal-backdrop" data-close-place-modal></div>
      <article class="place-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="placeModalTitle">
        <button class="place-modal-close" type="button" data-close-place-modal aria-label="Schließen">×</button>
        <div class="place-modal-body" id="placeModalBody"></div>
      </article>
    </div>

    <section class="print-area" id="printArea" aria-hidden="true"></section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./data/routeData.js?v=10"></script>
    <script src="./data/googleConfig.js?v=1"></script>
    <script src="./app.js?v=22"></script>
  </body>
</html>
